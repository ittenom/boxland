# Boxland — local development stack.
#
# Usage:
#   docker compose -f docker/docker-compose.yml up -d   # start dependencies
#   docker compose -f docker/docker-compose.yml down    # stop them
#
# The Boxland server itself runs on the host (not in compose) during dev so
# tests, the debugger, and live reload all work normally. Compose only
# provides Postgres, Redis, Mailpit, and MinIO.

name: boxland-dev

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: boxland
      POSTGRES_PASSWORD: boxland_dev
      POSTGRES_DB: boxland
    ports:
      # Host port 5433 to avoid conflicts with locally installed Postgres.
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U boxland -d boxland"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      # Host port 6380 to avoid conflicts with locally installed Redis.
      - "6380:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # Mailpit captures all dev SMTP traffic; web UI on http://localhost:8025.
  mailpit:
    image: axllent/mailpit:latest
    restart: unless-stopped
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI
    environment:
      MP_SMTP_AUTH_ACCEPT_ANY: "1"
      MP_SMTP_AUTH_ALLOW_INSECURE: "1"

  # MinIO is the local S3-compatible object store; web console on http://localhost:9001.
  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: ["server", "/data", "--console-address", ":9001"]
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: boxland
      MINIO_ROOT_PASSWORD: boxland_dev_secret
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 10

  # One-shot job that creates the dev S3 bucket on first start.
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 boxland boxland_dev_secret &&
        (mc mb -p local/boxland-assets || true) &&
        echo 'minio bucket boxland-assets ready'
      "

volumes:
  postgres-data:
  redis-data:
  minio-data:
